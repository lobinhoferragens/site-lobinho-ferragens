<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Detalhes do produto - Lobinho Ferragens"
    >

    <title>Produto | Lobinho Ferragens</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
</head>

<body>

    <header class="product-page-header">

        <div class="container product-page-header-content">

            <a
                href="index.html"
                class="product-page-logo"
            >
                <strong>Lobinho Ferragens</strong>
                <span>Ferragens • Ferramentas • Utilidades</span>
            </a>

            <a
                href="index.html#catalogo"
                class="product-back-button"
            >
                <i class="fa-solid fa-arrow-left"></i>
                Voltar ao catálogo
            </a>

        </div>

    </header>

    <main class="product-detail-page">

        <div class="container">

            <div
                id="produtoDetalhes"
                class="product-detail"
            >

                <div class="product-detail-loading">
                    Carregando produto...
                </div>

            </div>

            <section
                id="produtosRelacionadosSecao"
                class="related-products-section"
                hidden
            >

                <div class="section-title">
                    <h2>Produtos relacionados</h2>
                    <p>Outros produtos que podem ser úteis para você.</p>
                </div>

                <div
                    id="produtosRelacionados"
                    class="products-grid related-products-grid"
                >
                </div>

            </section>

        </div>

    </main>

    <a
        href="https://wa.me/5547999999999"
        target="_blank"
        rel="noopener noreferrer"
        class="whatsapp-float"
        aria-label="Falar no WhatsApp"
    >
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="js/produto.js"></script>

</body>

</html>
